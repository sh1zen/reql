name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run tests
        run: PYTHONPATH=src python -m unittest discover -s tests -v

      - name: Verify CLI entry points
        run: |
          python cli.py --help
          reql config show
          reql install codex --project --dry-run

  package-check:
    name: Package check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

  reql-self-check:
    name: REQL self graph
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Compile repository graph
        run: python cli.py project compile .

      - name: Generate reports
        run: python cli.py project report . --output reports

      - name: Generate HTML and JSON graph export
        run: python cli.py export --html --json --out reql-graph-out

      - name: Upload graph artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reql-self-graph
          path: |
            .reql/memory.reql
            reports/*.md
            reql-graph-out/graph.html
            reql-graph-out/graph.json
          retention-days: 7

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install bandit pip-audit

      - name: bandit static security analysis
        continue-on-error: true
        run: bandit -r src cli.py launcher.py -ll

      - name: pip-audit dependency vulnerabilities
        continue-on-error: true
        run: pip-audit --strict
